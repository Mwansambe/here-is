[phases.setup]
nixPkgs = [
  "php83",
  "php83Packages.composer",
  "php83Extensions.pdo",
  "php83Extensions.pdo_pgsql",
  "php83Extensions.mbstring",
  "php83Extensions.xml",
  "php83Extensions.curl",
  "php83Extensions.zip",
  "php83Extensions.bcmath",
  "php83Extensions.gd",
  "php83Extensions.tokenizer",
  "php83Extensions.fileinfo",
  "php83Extensions.openssl"
]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction --no-scripts",
  "php artisan config:clear",
  "php artisan route:clear"
]

[start]
cmd = "php artisan migrate --force --no-interaction && php artisan db:seed --force --no-interaction && php artisan storage:link 2>/dev/null || true && php artisan config:cache && php artisan route:cache && php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
