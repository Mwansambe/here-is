[phases.setup]
nixPkgs = ["php82", "php82Extensions.pgsql", "php82Extensions.pdo", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.bcmath", "php82Extensions.gd", "php82Extensions.tokenizer", "composer"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --force --class=DatabaseSeeder && php artisan storage:link 2>/dev/null; php artisan serve --host=0.0.0.0 --port=$PORT"
